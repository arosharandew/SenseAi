<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignalSense AI | Hybrid Call Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/askai.css">
</head>
<body>
  <div class="orb-bg"></div>
  <div class="noise-overlay"></div>

  <div class="chat-container">
    <div class="chat-header">
      <div class="header-title">
        <i class="fas fa-robot"></i> SignalSense AI Assistant
      </div>
      <button id="backHomeBtn" class="glass-btn">
        <i class="fas fa-home"></i> Home
      </button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        <div class="avatar"><i class="fas fa-microchip"></i></div>
        <div class="content">
          📞 Hybrid Call Assistant ready.<br>
          Ask anything about call logs (call ID, last call, drops, etc.)
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off">
      <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script src="/askai.js"></script>
</body>
</html>
